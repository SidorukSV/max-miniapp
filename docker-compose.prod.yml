services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
    ports:
      - "3443:3443"
    volumes:
      - ./deploy/certs:/app/certs:ro

  frontend-build:
    build:
      context: ./frontend
      target: build
      args:
        VITE_API_BASE: https://api.example.com/api/v1
    command: ["sh", "-c", "rm -rf /out/* && cp -r /app/dist/* /out/"]
    volumes:
      - ./frontend-dist:/out
    profiles:
      - tools
