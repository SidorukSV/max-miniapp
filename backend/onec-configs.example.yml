# Copy this file to backend/onec-configs.yml (or set ONEC_CONFIGS_FILE)
# and fill values for each city.
#
# IMPORTANT:
# JWT_SECRET is mandatory for backend startup and must be set via environment variable.
# Minimum requirements: 32+ chars and at least 3 of 4 classes (A-Z, a-z, 0-9, special symbols).
# Example:
#   export JWT_SECRET='YourStrongRandomSecretAtLeast32Chars!2026'
- cityId: "city-a"
  url: "https://example.com/onec/city-a/"
  basicAuth: "base64_login_password"

- cityId: "city-b"
  url: "https://example.com/onec/city-b/"
  basicAuth: "base64_login_password"
